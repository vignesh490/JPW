{% extends "base.html" %}

{% block content %}

<h2>{{ job.title }}</h2>

<p><b>Company:</b> {{ job.company }}</p>
<p><b>Location:</b> {{ job.location }}</p>
<p><b>Salary:</b> {{ job.salary }}</p>

<p>{{ job.description }}</p>

<a href="/apply/{{ job.id }}" class="btn">Apply Job</a>

{% endblock %}
