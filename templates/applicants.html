{% extends "base.html" %}

{% block content %}

<h2>Applicants</h2>

<table>

<tr>
<th>Name</th>
<th>Email</th>
<th>Status</th>
</tr>

{% for a in applicants %}

<tr>

<td>{{ a.name }}</td>
<td>{{ a.email }}</td>
<td>{{ a.status }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
