{% extends "base.html" %}

{% block content %}

<h2>Employer Dashboard</h2>

<a href="/post-job" class="btn">Post New Job</a>

<table>

<tr>
<th>Title</th>
<th>Location</th>
<th>Applicants</th>
</tr>

{% for job in jobs %}

<tr>

<td>{{ job.title }}</td>

<td>{{ job.location }}</td>

<td>
<a href="/applicants/{{ job.id }}">View</a>
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
