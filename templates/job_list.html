{% extends "base.html" %}

{% block content %}

<h2>Available Jobs</h2>

{% for job in jobs %}

<div class="job-card">

<h3>{{ job.title }}</h3>

<p><b>Company:</b> {{ job.company }}</p>
<p><b>Location:</b> {{ job.location }}</p>
<p><b>Salary:</b> {{ job.salary }}</p>

<a href="/job/{{ job.id }}" class="btn">View Details</a>

</div>

{% endfor %}

{% endblock %}
